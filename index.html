
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财富阶梯打卡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #fff6e6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            color: #c47826;
            margin: 10px 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
            text-align: center;
            font-size: 24px;
        }
        .slogan {
            font-size: 18px;
            font-weight: bold;
            color: #e65100;
            background: #fff;
            padding: 10px 20px;
            border-radius: 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1000px;
        }
        .progress-info {
            background: #fff;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
            color: #8b5a2b;
            min-width: 300px;
            width: 100%;
        }
        .progress-info p {
            margin: 8px 0;
            font-size: 16px;
        }
        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: #ffe8cc;
            border-radius: 10px;
            margin: 10px auto;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #ffb74d;
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        /* 多梦想模块 */
        .dreams-section {
            width: 100%;
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .dreams-section h3 {
            color: #c47826;
            margin-bottom: 15px;
            text-align: center;
        }
        .add-dream {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .add-dream input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ffe0b2;
            border-radius: 8px;
            outline: none;
        }
        .add-dream button {
            padding: 10px 15px;
            background: #ff9800;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .dream-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .dream-item {
            background: #fff9f0;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ffe0b2;
        }
        .dream-title {
            font-weight: bold;
            color: #c47826;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        .dream-progress {
            width: 100%;
            height: 10px;
            background: #ffe8cc;
            border-radius: 5px;
            overflow: hidden;
            margin: 8px 0;
        }
        .dream-progress-bar {
            height: 100%;
            background: #4CAF50;
            width: 0%;
            transition: width 0.5s;
        }
        .dream-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        .dream-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .dream-actions input {
            flex: 1;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .dream-actions button {
            padding: 6px 10px;
            background: #ff9800;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .ladder-container {
            position: relative;
            margin-top: 20px;
        }
        .ladder {
            position: relative;
            width: 400px;
            height: 500px;
        }
        .step {
            position: absolute;
            width: 320px;
            height: 60px;
            background: linear-gradient(to right, #ffe0b2, #fff);
            border: 3px solid #d48b37;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #5d3703;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
        .step:hover {
            transform: scale(1.05);
            box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
        }
        .step.completed {
            background: linear-gradient(to right, #ffcc80, #ffecb3);
            border-color: #ff9800;
            color: #e65100;
        }
        .step1 { top: 420px; left: 0; }
        .step2 { top: 360px; left: 30px; }
        .step3 { top: 300px; left: 60px; }
        .step4 { top: 240px; left: 90px; }
        .step5 { top: 180px; left: 120px; }
        .step6 { top: 120px; left: 150px; }
        .step7 { top: 60px; left: 180px; }
        .dog {
            position: absolute;
            bottom: 10px;
            left: 20px;
            width: 120px;
            transition: all 0.8s ease;
        }
        .dog svg {
            width: 100%;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.2));
        }
        .note-section {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            min-width: 300px;
            max-width: 350px;
        }
        .note-section h3 {
            color: #c47826;
            margin-bottom: 15px;
            text-align: center;
        }
        .note-input {
            width: 100%;
            height: 120px;
            border: 2px solid #ffe0b2;
            border-radius: 10px;
            padding: 10px;
            font-size: 15px;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 10px;
        }
        .note-input:focus {
            border-color: #ff9800;
        }
        .save-btn {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .save-btn:hover {
            background: #f57c00;
        }
        .note-history {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        .note-item {
            background: #fff6e6;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            color: #5d3703;
        }
        .note-date {
            font-size: 12px;
            color: #8b5a2b;
            margin-bottom: 5px;
        }
        .reset-btn {
            margin-top: 30px;
            padding: 10px 25px;
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .reset-btn:hover {
            background: #f57c00;
        }
    </style>
</head>
<body>
    <h1>🐶 财富阶梯成长打卡 🐾</h1>
    <div class="slogan">跟着小狗钱钱，每天存一点，富足生活看得见</div>

    <div class="progress-info">
        <p>当前进度：<span id="current-stage">未开始</span></p>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <p>今日：<span id="current-date"></span></p>
        <p>📅 累计打卡：<span id="total-days">0</span> 天</p>
        <p>🔥 连续打卡：<span id="streak-days">0</span> 天</p>
    </div>

    <!-- 多梦想储蓄罐 -->
    <div class="dreams-section">
        <h3>🎯 我的梦想储蓄罐（可自定义多个）</h3>
        <div class="add-dream">
            <input type="text" id="dream-name" placeholder="梦想名称（如：买车、旅行、教育）">
            <input type="number" id="dream-target" placeholder="目标金额">
            <button onclick="addDream()">添加梦想</button>
        </div>
        <div class="dream-list" id="dream-list"></div>
    </div>

    <div class="container">
        <div class="ladder-container">
            <div class="ladder">
                <div class="step step1" data-stage="1">读透小狗钱钱</div>
                <div class="step step2" data-stage="2">制定愿望清单</div>
                <div class="step step3" data-stage="3">梦想储蓄罐</div>
                <div class="step step4" data-stage="4">挣钱：帮助他人</div>
                <div class="step step5" data-stage="5">强制储蓄</div>
                <div class="step step6" data-stage="6">投资：钱生钱</div>
                <div class="step step7" data-stage="7">愿望达成：富足人生</div>
                <div class="dog" id="dog">
                    <svg viewBox="0 0 100 100" width="120">
                        <ellipse cx="50" cy="70" rx="30" ry="25" fill="#ffcc44"/>
                        <circle cx="50" cy="35" r="25" fill="#ffcc44"/>
                        <ellipse cx="25" cy="25" rx="10" ry="15" fill="#ffaa22"/>
                        <ellipse cx="75" cy="25" rx="10" ry="15" fill="#ffaa22"/>
                        <circle cx="40" cy="32" r="4" fill="#000"/>
                        <circle cx="60" cy="32" r="4" fill="#000"/>
                        <ellipse cx="50" cy="42" rx="8" ry="6" fill="#333"/>
                        <path d="M42 48 Q50 55 58 48" stroke="#ff5555" stroke-width="2" fill="none"/>
                        <ellipse cx="30" cy="40" rx="5" ry="3" fill="#ffb399" opacity="0.6"/>
                        <ellipse cx="70" cy="40" rx="5" ry="3" fill="#ffb399" opacity="0.6"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="note-section">
            <h3>📝 每日成长记录</h3>
            <textarea class="note-input" id="note-input" placeholder="写下今天的收获、感悟或计划吧~"></textarea>
            <button class="save-btn" onclick="saveNote()">✅ 今日打卡</button>
            <div class="note-history" id="note-history">
                <h4 style="color: #8b5a2b; margin-bottom: 10px;">历史记录</h4>
            </div>
        </div>
    </div>

    <button class="reset-btn" onclick="resetAll()">重置所有数据</button>

    <script>
        const stages = [
            "读透小狗钱钱",
            "制定愿望清单",
            "梦想储蓄罐",
            "挣钱:帮助他人",
            "强制储蓄",
            "投资:钱生钱",
            "愿望达成:富足人生"
        ];

        const stepElements = document.querySelectorAll('.step');
        const dog = document.getElementById('dog');
        const currentStageEl = document.getElementById('current-stage');
        const progressBar = document.getElementById('progress-bar');
        const currentDateEl = document.getElementById('current-date');
        const totalDaysEl = document.getElementById('total-days');
        const streakDaysEl = document.getElementById('streak-days');
        const noteInput = document.getElementById('note-input');
        const noteHistory = document.getElementById('note-history');
        const dreamListEl = document.getElementById('dream-list');

        const today = new Date();
        const todayStr = today.toLocaleDateString('zh-CN');
        const todayYmd = getYMD(today);
        currentDateEl.textContent = todayStr;

        function getYMD(date) {
            return date.getFullYear() + "-" +
                   String(date.getMonth()+1).padStart(2,'0') + "-" +
                   String(date.getDate()).padStart(2,'0');
        }

        // 基础数据
        let currentStage = Number(localStorage.getItem('financeStage')) || 0;
        let notes = JSON.parse(localStorage.getItem('financeNotes')) || [];
        let checkinDates = JSON.parse(localStorage.getItem('checkinDates')) || [];
        let dreams = JSON.parse(localStorage.getItem('dreams')) || [];
        let totalDays = checkinDates.length;
        let streakDays = calcStreak(checkinDates);

        updateUI();
        renderDreams();

        // 阶段点击
        stepElements.forEach(step => {
            step.addEventListener('click', () => {
                currentStage = parseInt(step.dataset.stage);
                localStorage.setItem('financeStage', currentStage);
                updateUI();
            });
        });

        // 打卡
        function saveNote() {
            const content = noteInput.value.trim();
            if (!content) {
                alert('请写点什么再打卡哦~');
                return;
            }
            if (!checkinDates.includes(todayYmd)) {
                checkinDates.push(todayYmd);
                localStorage.setItem('checkinDates', JSON.stringify(checkinDates));
                totalDays = checkinDates.length;
                streakDays = calcStreak(checkinDates);
            }
            const note = {
                date: todayStr,
                ymd: todayYmd,
                stage: currentStage ? stages[currentStage-1] : '未开始',
                content: content
            };
            notes.unshift(note);
            localStorage.setItem('financeNotes', JSON.stringify(notes));
            noteInput.value = '';
            updateUI();
            alert('✅ 打卡成功！');
        }

        // 连续打卡
        function calcStreak(dates) {
            if (dates.length === 0) return 0;
            const set = new Set(dates);
            let streak = 0;
            let d = new Date();
            while (true) {
                const key = getYMD(d);
                if (set.has(key)) {
                    streak++;
                    d.setDate(d.getDate() - 1);
                } else {
                    break;
                }
            }
            return streak;
        }

        // 更新界面
        function updateUI() {
            stepElements.forEach(s => {
                const n = parseInt(s.dataset.stage);
                n <= currentStage ? s.classList.add('completed') : s.classList.remove('completed');
            });
            const pos = [
                {top:380,left:20},{top:320,left:50},{top:260,left:80},
                {top:200,left:110},{top:140,left:140},{top:80,left:170},{top:20,left:200}
            ];
            if (currentStage > 0) {
                dog.style.bottom = 'auto';
                dog.style.top = pos[currentStage-1].top + 'px';
                dog.style.left = pos[currentStage-1].left + 'px';
            } else {
                dog.style.top = 'auto';
                dog.style.bottom = '10px';
                dog.style.left = '20px';
            }
            currentStageEl.textContent = currentStage ? stages[currentStage-1] : '未开始';
            progressBar.style.width = currentStage ? (currentStage/stages.length*100)+'%' : '0%';
            totalDaysEl.textContent = totalDays;
            streakDaysEl.textContent = streakDays;
            renderNotes();
        }

        function renderNotes() {
            noteHistory.innerHTML = `<h4 style="color: #8b5a2b; margin-bottom: 10px;">历史记录</h4>`;
            if (notes.length === 0) {
                noteHistory.innerHTML += `<p style="color:#aaa; text-align:center;">暂无记录</p>`;
                return;
            }
            notes.forEach(n => {
                const div = document.createElement('div');
                div.className = 'note-item';
                div.innerHTML = `
                    <div class="note-date">${n.date} | ${n.stage}</div>
                    <div>${n.content}</div>
                `;
                noteHistory.appendChild(div);
            });
        }

        // ======================
        // 多梦想功能
        // ======================
        function addDream() {
            const name = document.getElementById('dream-name').value.trim();
            const target = Number(document.getElementById('dream-target').value);
            if (!name || !target || target <= 0) {
                alert('请输入完整的梦想名称和目标金额');
                return;
            }
            dreams.push({
                id: Date.now(),
                name: name,
                target: target,
                saved: 0
            });
            localStorage.setItem('dreams', JSON.stringify(dreams));
            document.getElementById('dream-name').value = '';
            document.getElementById('dream-target').value = '';
            renderDreams();
            alert('梦想添加成功！');
        }

        function renderDreams() {
            dreamListEl.innerHTML = '';
            dreams.forEach((dream, index) => {
                const percent = dream.target > 0 ? Math.min(Math.round((dream.saved / dream.target) * 100), 100) : 0;
                const left = Math.max(dream.target - dream.saved, 0);
                const item = document.createElement('div');
                item.className = 'dream-item';
                item.innerHTML = `
                    <div class="dream-title">
                        ${dream.name}
                        <span style="color:#999;font-size:14px;">ID:${dream.id}</span>
                    </div>
                    <div class="dream-progress">
                        <div class="dream-progress-bar" style="width:${percent}%"></div>
                    </div>
                    <div class="dream-row">
                        <span>目标：¥${dream.target}</span>
                        <span>已存：¥${dream.saved}</span>
                        <span>进度：${percent}%</span>
                    </div>
                    <div class="dream-row">
                        <span>剩余：¥${left}</span>
                    </div>
                    <div class="dream-actions">
                        <input type="number" placeholder="存入金额" id="save-${dream.id}">
                        <button onclick="saveToDream(${index})">存入</button>
                        <button onclick="deleteDream(${index})" style="background:#f44336">删除</button>
                    </div>
                `;
                dreamListEl.appendChild(item);
            });
        }

        function saveToDream(index) {
            const dream = dreams[index];
            const input = document.getElementById(`save-${dream.id}`);
            const money = Number(input.value);
            if (!money || money <= 0) {
                alert('请输入有效金额');
                return;
            }
            dream.saved += money;
            localStorage.setItem('dreams', JSON.stringify(dreams));
            input.value = '';
            renderDreams();
            alert('存入成功！');
        }

        function deleteDream(index) {
            if (!confirm('确定删除这个梦想吗？')) return;
            dreams.splice(index, 1);
            localStorage.setItem('dreams', JSON.stringify(dreams));
            renderDreams();
        }

        // 重置
        function resetAll() {
            if (!confirm('确定清空所有数据？不可恢复！')) return;
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
